<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" title="Toggle Light/Dark Mode">🌓</button>

        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers" id="lotto-numbers"></div>

        <div class="partnership-section">
            <hr>
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mrealbwl" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we collaborate?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
