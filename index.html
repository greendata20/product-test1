<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" title="Toggle Light/Dark Mode">🌓</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers" id="lotto-numbers"></div>
        <button id="generate-btn">Generate Numbers</button>

        <div class="partnership-section">
            <hr>
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mrealbwl" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we collaborate?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
